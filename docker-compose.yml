version: '3.8'

services:
  frontend:
    build:
      context: ./frontend  # フロントエンドのソースがあるディレクトリを指定
      dockerfile: Dockerfile  # `front/` 内の `Dockerfile` を使用
    ports:
      - "3000:3000"
    volumes:
      - ./front:/app  # ローカルの `front/` をコンテナの `/app` にマウント
      - /app/node_modules  # `node_modules` をコンテナ側のみで管理
    environment:
      - NODE_ENV=development
    working_dir: /app
    command: npm run dev  # 開発環境用のコマンド

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]  # FastAPI のホットリロードを有効化
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/mydatabase

  db:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
